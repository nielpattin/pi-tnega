packages:
  - "extensions/*"

minimumReleaseAgeExclude:
  - "@earendil-works/*"
  - "@nielpattin/*"
  - "@mariozechner/*"
  - "pi-hermes-memory"
allowBuilds:
  "@google/genai": true
  esbuild: true
  koffi: true
  protobufjs: true
  better-sqlite3: true
  tree-sitter-bash: true
  
# Supply chain security
minimumReleaseAge: 7200          # 5 days (or 1440 for 1 day)
blockExoticSubdeps: true

# Extra hardening (recommended in v11)
strictDepBuilds: true